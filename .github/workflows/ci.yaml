name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [user-service, info-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:latest ./services/${{ matrix.service }}

      - name: Tag image with commit SHA
        run: |
          docker tag ${{ matrix.service }}:latest ${{ matrix.service }}:${{ github.sha }}
